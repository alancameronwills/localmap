<!DOCTYPE HTML>
<html translate="no">

<head>
    <title>Map Digi</title>
    <meta name="viewport"
        content="width=device-width, user-scalable=no, minimum-scale=1, maximum-scale=1,initial-scale=1" />
    <meta http-equiv='Content-Type' content='text/html; charset=utf-8' />
    <script>window.version = 1.53;</script>
    <script src="scripts/azure-storage.common.min.js"></script>
    <script src="scripts/azure-storage.blob.min.js"></script>
    <script src="scripts/markerclustererplus.min.js"></script>
    <script src="scripts/util.js?v=1.9"></script>
    <script src="scripts/sign-in.js?v=19"></script>
    <script src="scripts/exif-js.js"></script>
    <script src="scripts/model.js?v=1.19"></script>
    <script src="scripts/azuredb.js?v=1.25"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .me {
            background-color: lightgray;
            font-style: italic;
        }

        .super {
            background-color: lightblue;
        }

        #usertable {
            border-collapse: collapse;
            margin-top: 12px;
        }

        #usertable tr {
            background-color: whitesmoke;
        }

        #usertable tr:first-of-type {
            background-color: royalblue;
            color: white;
            font-weight: bold;
        }

        #usertable td {
            padding: 2px 6px;
        }

        tr:not(.me):hover>.role {
            background-color: lightyellow;
        }

        tr:not(.me)>.role {
            cursor: pointer;
        }

        tr:not(.me)>.role:hover {
            outline: 1px solid gray;
        }

        #roleMenu {
            position: absolute;
            width: auto;
            height: auto;
            border: 1px solid blue;
            background-color: white;
            padding: 4px;
            cursor: pointer;
        }

        #roleMenu>div:hover {
            background-color: lightblue;
        }

        #mask {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            opacity: 0.5;
            background-color: white;
            z-index: 10;
        }

        #projectForm fieldset {
            margin: 8px 0;
        }

        #projectForm label {
            display: inline-block;
        }

        #projectForm .field {
            margin: 4px 0;
        }

        #projectForm .field>span {
            display: inline-block;
            width: 130px;
            vertical-align: top;
            color: #555;
        }

        #projectForm input[type=text] {
            width: 60ch;
            max-width: 80vw;
        }

        #projectForm textarea {
            font-family: monospace;
            width: 60ch;
            max-width: 80vw;
        }

        #splashEdit {
            font-family: monospace;
            width: 200ch;
            max-width: 90vw;
            height: 80em;
            max-height: 80vh;
        }

        button {
            margin-right: 6px;
            padding: 4px 10px;
        }

        .super-only {
            display: none;
        }

        #topBar {
            padding: 8px 0;
            border-bottom: 1px solid #ccc;
            margin-bottom: 4px;
        }

        #project {
            color: #b00;
            margin: 6px 0;
        }

        .tabBar {
            display: flex;
            gap: 2px;
            margin-top: 8px;
        }

        .tabBar>div {
            padding: 6px 18px;
            cursor: pointer;
            background-color: #eee;
            border: 1px solid #ccc;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            user-select: none;
        }

        .tabBar>div.active {
            background-color: royalblue;
            color: white;
            font-weight: bold;
        }

        .tabPanel {
            display: none;
            background-color: azure;
            padding: 10px;
            border: solid 1px royalblue;
            border-top-width: 2px;
            width: max-content;
        }

        .tabPanel.active {
            display: block;
        }
    </style>
    <script>
        // Get query parameters
        location.queryParameters = {};
        location.search.substr(1).split("&").forEach(function (pair) {
            if (pair === "") return;
            var parts = pair.split("=");
            location.queryParameters[parts[0]] = parts[1] &&
                decodeURIComponent(parts[1].replace(/\+/g, " ")).replace(/%27/, "");
        });

        // Admin console state. ADMIN.fieldTypes records the original JS type of
        // each config field so the form can be reassembled with correct types.
        var ADMIN = { isSuperAdmin: false, projects: [], current: null, fieldTypes: {} };
        const SECURITY_FLAGS = ["instantContributor", "contributorRole"];

        function esc(s) { return ("" + (s == null ? "" : s)).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
        function escAttr(s) { return esc(s).replace(/"/g, "&quot;"); }

        function init() { loadProjects(location.queryParameters["project"].toLowerCase()); }

        // POST a JSON body with the auth cookie; cb(status, responseText).
        function postJson(url, obj, cb) {
            let req = new XMLHttpRequest();
            req.open("POST", url);
            req.withCredentials = true;
            req.setRequestHeader("content-type", "application/json");
            req.addEventListener("loadend", () => cb(req.status, req.responseText));
            req.send(JSON.stringify(obj));
        }

        // ---- Project list / selection ----

        function loadProjects(selectId) {
            g("mask").style.display = "block";
            getFile(serverUrl + "/api/listProjects", resp => {
                g("mask").style.display = "none";
                ADMIN.isSuperAdmin = !!(resp && resp.isSuperAdmin);
                ADMIN.projects = ((resp && resp.projects) || [])
                    .sort((a, b) => (a.name || a.id).localeCompare(b.name || b.id));
                renderSelector();
                let pick = selectId || (ADMIN.projects[0] && ADMIN.projects[0].id);
                if (pick) { g("projectSelect").value = pick; selectProject(pick); }
            }, err => {
                g("mask").style.display = "none";
                g("project").innerText = "You are not an administrator of any project.";
            });
        }

        function renderSelector() {
            let opts = ADMIN.projects
                .map(p => `<option value="${escAttr(p.id)}">${esc(p.name || p.id)} (${esc(p.id)})</option>`).join("");
            if (ADMIN.isSuperAdmin) opts += `<option value="!new">➕ New project…</option>`;
            g("projectSelect").innerHTML = opts;
            // Show superadmin-only controls.
            let sel = document.getElementsByClassName("super-only");
            for (let e of sel) e.style.display = ADMIN.isSuperAdmin ? "inline-block" : "none";
        }

        function onSelectChange() {
            let v = g("projectSelect").value;
            if (v === "!new") newProject();
            else selectProject(v);
        }

        function selectProject(id) {
            ADMIN.current = id;
            getFile(serverUrl + "/api/getProject?id=" + encodeURIComponent(id), cfg => {
                renderForm(cfg || {});
            }, err => renderForm({}));
            // Splash comes from the fast static file, by lowercased id.
            fetch(serverUrl + "/projects/" + id.toLowerCase() + ".html?t=" + Date.now())
                .then(r => r.ok ? r.text() : "")
                .then(t => { g("splashEdit").value = t; })
                .catch(() => { g("splashEdit").value = ""; });
            refresh();
        }

        // ---- Settings form (generated from the config object) ----

        function renderForm(cfg) {
            ADMIN.fieldTypes = {};
            let html = "<fieldset><legend>Access (superadmin only)</legend>";
            SECURITY_FLAGS.forEach(f => {
                let dis = ADMIN.isSuperAdmin ? "" : "disabled";
                html += `<label><input type="checkbox" id="fld_${f}" ${cfg[f] ? "checked" : ""} ${dis}/> ${f}</label> &nbsp; `;
            });
            html += "</fieldset><fieldset><legend>Settings</legend>";
            Object.keys(cfg).forEach(k => {
                if (SECURITY_FLAGS.indexOf(k) >= 0) return;
                let v = cfg[k];
                if (typeof v === "boolean") {
                    ADMIN.fieldTypes[k] = "boolean";
                    html += `<div class="field"><span><label for="fld_${k}">${esc(k)}</label></span><input type="checkbox" id="fld_${k}" ${v ? "checked" : ""}/></div>`;
                } else if (v !== null && typeof v === "object") {
                    ADMIN.fieldTypes[k] = "json";
                    let rows = Math.min(20, JSON.stringify(v, null, 2).split("\n").length);
                    html += `<div class="field"><span>${esc(k)} (JSON)</span><textarea id="fld_${k}" rows="${rows}">${esc(JSON.stringify(v, null, 2))}</textarea></div>`;
                } else {
                    ADMIN.fieldTypes[k] = (typeof v === "number") ? "number" : "string";
                    html += `<div class="field"><span>${esc(k)}</span><input type="text" id="fld_${k}" value="${escAttr(v)}"/></div>`;
                }
            });
            html += "</fieldset>";
            g("projectForm").innerHTML = html;
        }

        // Reassemble the config object from the form. Throws on bad JSON.
        function gatherConfig() {
            let cfg = {};
            Object.keys(ADMIN.fieldTypes).forEach(k => {
                let el = g("fld_" + k);
                if (!el) return;
                let t = ADMIN.fieldTypes[k];
                if (t === "boolean") cfg[k] = el.checked;
                else if (t === "number") cfg[k] = el.value === "" ? "" : Number(el.value);
                else if (t === "json") {
                    try { cfg[k] = JSON.parse(el.value); }
                    catch (e) { throw new Error("field '" + k + "': " + e.message); }
                }
                else cfg[k] = el.value;
            });
            SECURITY_FLAGS.forEach(f => { let el = g("fld_" + f); if (el) cfg[f] = el.checked; });
            return cfg;
        }

        function saveProject() {
            let cfg;
            try { cfg = gatherConfig(); }
            catch (e) { alert("Invalid JSON in " + e.message); return; }
            if (!cfg.id) { alert("An id is required."); return; }
            g("mask").style.display = "block";
            postJson(serverUrl + "/api/upsertProject",
                { config: cfg, splash: g("splashEdit").value },
                (status, body) => {
                    g("mask").style.display = "none";
                    if (status === 204) loadProjects(("" + cfg.id).toLowerCase());
                    else alert("Save failed (" + status + "): " + body);
                });
        }

        // Superadmin: start a blank new project.
        function newProject() {
            ADMIN.current = null;
            renderForm({
                id: "", title: "", org: "", admin: "",
                cartography: "google", region: "uk", welsh: false,
                languages: ["en"],
                loc: { n: 51.5, e: 0, z: 13, mapChoice: 0, mapBase: "google" },
                tags: [],
                instantContributor: false, contributorRole: false
            });
            g("splashEdit").value = "<h1></h1>";
            g("usertable").innerHTML = "";
            let f = g("fld_id"); if (f) f.focus();
        }

        // Superadmin: copy the project currently in the form into a new one.
        function duplicateProject() {
            let cfg;
            try { cfg = gatherConfig(); }
            catch (e) { alert("Fix the JSON first: " + e.message); return; }
            cfg.id = "";
            cfg.title = (cfg.title || "") + " (copy)";
            ADMIN.current = null;
            renderForm(cfg);
            g("projectSelect").value = "!new";
            g("usertable").innerHTML = "";
            let f = g("fld_id"); if (f) f.focus();
            alert("Enter a new id, then Save to create the duplicate. (Splash carried over.)");
        }

        function deleteProjectBtn() {
            let id = ADMIN.current;
            if (!id) return;
            if (!confirm("Delete project '" + id + "'? Its places are NOT deleted.")) return;
            g("mask").style.display = "block";
            postJson(serverUrl + "/api/deleteProject", { id: id }, (status, body) => {
                g("mask").style.display = "none";
                if (status === 204) loadProjects();
                else alert("Delete failed (" + status + "): " + body);
            });
        }

        // ---- User roles table (scoped to the selected project) ----

        function refresh(userid, project, role) {
            if (!ADMIN.current) { g("usertable").innerHTML = ""; return; }
            g("mask").style.display = "block";
            let update = "?project=" + encodeURIComponent(ADMIN.current);
            if (userid && role) update += `&user=${userid}&role=${role}`;
            getFile(serverUrl + "/api/userRoles" + update, response => {
                g("mask").style.display = "none";
                let cols = [ADMIN.current];
                let users = (response.body && response.body.users) || [];
                g("usertable").innerHTML =
                    "<tr><td>Full</td><td>Display</td><td>contact</td>"
                    + `<td>${cols.map(esc).join("</td><td>")}</td></tr>`
                    + users.filter(u => {
                            if ("admin" == u.Role) return true;
                            let roles = (u.Role || "").split(";");
                            for (const r of roles) {
                                if (r.indexOf(":"+project)==0) return true;
                            }
                            return false;
                        })
                        .sort((a, b) => (a.FullName || "").localeCompare(b.FullName || ""))
                        .map(u => {
                            let roles = (u.Role || "").split(";");
                            let classes = ((u.Role || "") == "admin" ? "super " : "")
                                + (u.rowKey == response.body.myId ? "me " : "");
                            let isMeClass = classes ? `class='${classes}'` : "";
                            return `<tr id="${escAttr(u.rowKey)}" ${isMeClass}><td class="fullname" contenteditable="true">${esc(u.FullName)}</td><td class="displayname" contenteditable="true">${esc(u.DisplayName)}</td>`
                                + `<td><a href="mailto:${escAttr(u.email)}">${esc(u.email)}</a></td>`
                                + (roles[0] == "admin" ? `<td colspan='${cols.length}'>ADMIN</td>` :
                                    cols.map(p => `<td onclick="chooseUI(this,'${escAttr(p)}')" class="role">${esc((roles.find(r => r.indexOf(":" + p) >= 0) || "").split(":")[0])}</td>`).join(""))
                                + "</tr>"
                        }).join("");
                addHandlers("displayname");
                addHandlers("fullname");
            }, error => { g("mask").style.display = "none"; });
        }

        function addHandlers(className) {
            let elements = document.getElementsByClassName(className);
            for (let i = 0; i < elements.length; i++) {
                elements[i].addEventListener("blur", updateName);
            }
        }

        function updateName(o, e) {
            let td = o.target;
            if (!td) return;
            let id = td.parentNode.id;
            if (!id || td.parentNode.className.startsWith("me")) return;
            let newName = text(td);
            if (td.className == "displayname") {
                let existingfullname = text(td.parentNode.getElementsByClassName("fullname")[0]) || newName;
                getFile(serverUrl + "/api/checkUser?id=" + id + "&name=" + existingfullname + " &display="
                    + encodeURI(newName, " ").trim(), null);
            } else if (td.className == "fullname") {
                getFile(serverUrl + "/api/checkUser?id=" + id + "&name="
                    + encodeURI(newName, " ").trim(), null);
            }
            refresh();
        }

        function chooseUI(td, project) {
            stopDropMenu();
            let table = g("usertable");
            let id = td.parentNode.id;
            if (td.parentNode.className.startsWith("me")) return;
            let menu = g("roleMenu");
            menu.style.top = (td.offsetTop + td.offsetHeight + table.offsetTop) + "px";
            menu.style.left = (td.offsetLeft + table.offsetLeft) + "px";
            menu.project = project;
            menu.userid = id;
            menu.style.display = "block";
        }
        function dropMenu() { window.dropMenuTimer = setTimeout(dropMenuNow, 500); }
        function stopDropMenu() { clearTimeout(window.dropMenuTimer); window.dropMenuTimer = null; }
        function dropMenuNow() { g("roleMenu").style.display = "none"; stopDropMenu(); }
        function clickMenu(o, e) {
            let userid = e.target.parentNode.userid;
            let project = e.target.parentNode.project;
            let newRole = e.target.innerText;
            if (!userid || !project || !newRole) return;
            dropMenuNow();
            refresh(userid, project, newRole);
        }

        // ---- Tabs ----

        function showTab(name) {
            for (let p of document.querySelectorAll(".tabPanel"))
                p.classList.toggle("active", p.id === "tab_" + name);
            for (let t of document.querySelectorAll(".tabBar > div"))
                t.classList.toggle("active", t.dataset.tab === name);
        }
    </script>
</head>

<body onload="init()">
    <div id="topBar">
        <label>Project:
            <select id="projectSelect" onchange="onSelectChange()"></select>
        </label>
        <button onclick="saveProject()">Save</button>
        <button class="super-only" onclick="duplicateProject()">Duplicate</button>
        <button class="super-only" onclick="deleteProjectBtn()">Delete</button>
    </div>
    <div id="project"></div>

    <div class="tabBar">
        <div data-tab="users" class="active" onclick="showTab('users')">Users</div>
        <div data-tab="splash" onclick="showTab('splash')">Splash</div>
        <div data-tab="settings" onclick="showTab('settings')">Settings</div>
    </div>

    <div id="tab_users" class="tabPanel active">
        <table id="usertable" onmouseleave="dropMenu()">
        </table>
        <div id="roleMenu" style="display:none" onmouseleave="dropMenu()" onmouseenter="stopDropMenu()"
            onclick="clickMenu(this, event)">
            <div>admin</div>
            <div>editor</div>
            <div>contributor</div>
            <div>viewer</div>
        </div>
    </div>

    <div id="tab_settings" class="tabPanel">
        <div id="projectForm"></div>
    </div>

    <div id="tab_splash" class="tabPanel">
        <div class="field" style="margin-bottom:6px"><span>Splash HTML</span></div>
        <textarea id="splashEdit"></textarea>
    </div>

    <div id="mask" style="display:none">Loading...</div>
</body>

</html>
